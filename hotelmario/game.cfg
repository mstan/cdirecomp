# Hotel Mario (USA) — CdiRecomp game config (TOML)
#
# Parsed by the shared frontend's game_config loader. Today only [game] is
# consumed; the CD-i-specific [disc]/[modules] sections below are
# forward-looking documentation of the real structure (the loader ignores
# unknown tables) and will drive the CD-RTOS loader once MC-CDI-001 lands.

[game]
output_prefix = "hotelmario"

[disc]
# \\SERVER\Games\CDI\Hotel Mario (USA)\Hotel Mario (USA).cue
image      = "Hotel Mario (USA).bin"
sectors    = 156100        # 367,147,200 bytes / 2352
track_mode = 2             # Green Book Mode-2
volume_id  = "CD-I "

[modules]
# The recompilation target. From the disc inventory (CdiRecomp, 203 modules):
#   boot/main program module — recompile this first.
boot = "cdi_hotel"         # Prog, lang=1, ~112984 bytes @ LBA 2272
# Other program module:
#   cdi_bumper  (Prog, ~11614 bytes @ LBA 2444)
# Per-level/scene subroutine modules streamed at run time via F$Load:
#   L0_s01_sub.o .. L8_s15_sub.o  (Subr, lang=1) + matching _subT.o twins
# Data/AV maps:
#   cdi_L*_dat.map / cdi_L*_av.map / cdi_L*_am.map  (Data)

# [functions] / [[jump_table]] / [[protected_range]] / [ram_layout] get added
# once the loader resolves the boot module into a flat image and the first
# codegen pass runs. [ram_layout] will be required before --emit (CD-i RAM:
# bank0 0x000000-0x07FFFF, bank1 0x200000-0x27FFFF).
